<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GoldWise | Admin Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="admin.css">
</head>
<body>

    <!-- Login Section -->
    <div id="loginSection">
        <h2>Enter Admin Password</h2>
        <input type="password" id="adminPassword" placeholder="Password">
        <button onclick="checkPassword()">Login</button>
    </div>

    <!-- Unified Dashboard Wrapper -->
    <div class="dashboard-wrapper" id="adminDashboardWrapper" style="display: none;">
        
        <!-- Persistent Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2>GoldWise</h2>
                <p>Admin Portal</p>
            </div>
            <ul class="sidebar-nav">
                <li class="active"><a href="admin.html"><i class="fa fa-box"></i> Manage Products</a></li>
                <li><a href="trial_cp/index.html"><i class="fa fa-users"></i> Customer Portfolio</a></li>
                <li><a href="1/index.html"><i class="fa fa-calculator"></i> Expense Calculator</a></li>
            </ul>
        </aside>

        <!-- Main Content Area -->
        <main class="main-content">
            
            <!-- Top App Header -->
            <header class="topbar">
                <div class="breadcrumbs">
                    <span>Admin Suite</span> <span class="separator">/</span> <span class="current">Manage Products</span>
                </div>
                <div class="topbar-actions">
                    <span class="admin-profile"><i class="fa fa-user-circle"></i> Admin</span>
                    <button class="btn-logout" onclick="logoutAdmin()"><i class="fa fa-sign-out"></i> Logout</button>
                </div>
            </header>

            <!-- Page Specific Content -->
            <div class="content-container" id="adminPanel">
                
                <!-- Premium Metric Cards -->
                <div class="metric-cards">
                    <div class="metric-card">
                        <div class="metric-icon gold-bg"><i class="fa fa-gem"></i></div>
                        <div class="metric-info">
                            <h4>Total Products</h4>
                            <p id="metricTotalProducts">0</p>
                        </div>
                    </div>
                    <div class="metric-card">
                        <div class="metric-icon blue-bg"><i class="fa fa-tags"></i></div>
                        <div class="metric-info">
                            <h4>Categories</h4>
                            <p id="metricCategories">0</p>
                        </div>
                    </div>
                </div>

                <!-- Add Product Form Card -->
                <div class="dashboard-card">
                    <div class="card-header">
                        <h3>Add New Product</h3>
                    </div>
                    <div class="card-body">
                        <form id="productForm">
                            <div class="form-grid">
                                <input type="text" id="brand" placeholder="Brand">
                                <input type="text" id="collection" placeholder="Collection">
                                <input type="text" id="karatage" placeholder="Karatage (e.g., 18K)">
                                <input type="text" id="name" placeholder="Product Name" required>
                                <input type="number" id="price" placeholder="Price (₹)" required>
                                <input type="text" id="image" placeholder="Image URL">
                                <input type="text" id="clarity" placeholder="Clarity (e.g., VVS1)">
                                <input type="text" id="weight" placeholder="Product Weight (e.g., 3 gram)">
                                <input type="text" id="grossWeight" placeholder="Gross Weight (e.g., 3.473g)">
                                <input type="text" id="metalType" placeholder="Metal Type (e.g., Gold)">
                                <input type="text" id="metalColor" placeholder="Metal Color (e.g., White-Golden)">
                                <input type="text" id="productCode" placeholder="Product Code (optional)">
                                <input type="text" id="category" placeholder="Category (gold, diamond, platinum)">
                                <input type="text" id="type" placeholder="Type (ring, bangle, earRings, necklace)">
                            </div>
                            <textarea id="description" placeholder="Full Product Description" required></textarea>
                            <button type="submit" class="btn-primary">Add Product Database Entry</button>
                        </form>
                    </div>
                </div>

                <!-- Product List Card -->
                <div class="dashboard-card">
                    <div class="card-header">
                        <h3>Product Inventory</h3>
                    </div>
                    <div class="card-body table-responsive">
                        <table id="productDataTable">
                            <thead>
                                <tr>
                                    <th>Name</th>
                                    <th>Price</th>
                                    <th>Image</th>
                                    <th style="width: 150px; text-align: center;">Actions</th>
                                </tr>
                            </thead>
                            <tbody id="productTable"></tbody>
                        </table>
                    </div>
                </div>

            </div>
        </main>
    </div>

    <script src="JS/admin.js"></script>
    <script>
        // Check login state immediately
        if (localStorage.getItem('isLoggedIn') === 'true') {
            document.getElementById("loginSection").style.display = "none";
            document.getElementById("adminDashboardWrapper").style.display = "flex";
        }

        function checkPassword() {
            let password = document.getElementById("adminPassword").value;
            if (password === "admin123") {  
                localStorage.setItem("isLoggedIn", "true");
                document.getElementById("loginSection").style.display = "none";
                document.getElementById("adminDashboardWrapper").style.display = "flex";
            } else {
                alert("Incorrect Password!");
            }
        }

        function logoutAdmin() {
            localStorage.removeItem("isLoggedIn");
            location.reload();
        }

        // Hook into product addition to update metrics
        const form = document.getElementById('productForm');
        if(form) {
            form.addEventListener('submit', function(e) {
                // The actual logic is likely in JS/admin.js which hooks into this form too.
                setTimeout(updateMetrics, 500); 
            });
        }

        async function updateMetrics() {
            try {
                const PRODUCTS_API = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1'
                  ? 'http://localhost:5500/api/products'
                  : 'https://goldwise-jewelry-backend.onrender.com/api/products';
                const res = await fetch(PRODUCTS_API);
                const products = await res.json();
                document.getElementById('metricTotalProducts').textContent = products.length;
                const categories = new Set(products.map(p => p.category).filter(Boolean));
                document.getElementById('metricCategories').textContent = categories.size;
            } catch(e) {
                // fallback silently
            }
        }

        // Run metrics on load
        window.addEventListener('DOMContentLoaded', updateMetrics);
    </script>
</body>
</html>
