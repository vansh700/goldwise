<link rel="stylesheet" href="CSS/headerFooterNavbar.css" />
<header class="header" id="site-header">
  <!-- Logo -->
  <div class="logo">
    <a href="Home.html">GoldWise</a>
  </div>

  <!-- Search Bar -->
  <div class="search-bar">
    <input type="text" placeholder="Search for jewelry..." id="header-search" />
    <button type="button" aria-label="Search"><i class="fa fa-search"></i></button>
  </div>

  <!-- Navigation Icons -->
  <nav class="nav-links">
    <a href="offers.html" title="Offers" aria-label="Offers">
      <i class="fa fa-tags"></i>
    </a>
    <a href="nearby.html" title="Find Store" aria-label="Nearby Stores">
      <i class="fa fa-map-marker"></i>
    </a>
    <a href="cart.html" title="Cart" aria-label="Shopping Cart" class="cart-link">
      <i class="fa fa-shopping-cart"></i>
      <span class="cart-badge" id="cart-count" style="display:none">0</span>
    </a>

    <!-- Auth-aware Profile Area -->
    <div class="profile-wrapper" id="profile-wrapper">
      <!-- Shown when NOT logged in -->
      <a href="login.html" class="nav-login-btn" id="nav-login-btn" title="Sign In">
        <i class="fa fa-user"></i>
        <span>Sign In</span>
      </a>

      <!-- Shown when logged in -->
      <div class="user-menu" id="user-menu" style="display:none">
        <button class="user-avatar-btn" id="profile-link" aria-label="User Menu" aria-haspopup="true" aria-expanded="false">
          <div class="avatar-circle" id="avatar-circle">
            <span id="avatar-initials">U</span>
          </div>
          <span class="user-name-display" id="user-display-name">User</span>
          <i class="fa fa-chevron-down chevron-icon" id="chevron-icon"></i>
        </button>

        <div class="auth-dropdown" id="auth-dropdown" role="menu">
          <div class="dropdown-header">
            <div class="dropdown-avatar" id="dropdown-avatar-circle">
              <span id="dropdown-initials">U</span>
            </div>
            <div>
              <div class="dropdown-name" id="dropdown-user-name">User</div>
              <div class="dropdown-email" id="dropdown-user-email">user@email.com</div>
            </div>
          </div>
          <div class="dropdown-divider"></div>
          <a href="profile.html" class="dropdown-item" role="menuitem">
            <i class="fa fa-user-circle"></i> My Profile
          </a>
          <a href="cart.html" class="dropdown-item" role="menuitem">
            <i class="fa fa-shopping-bag"></i> My Orders
          </a>
          <div class="dropdown-divider"></div>
          <button class="dropdown-item dropdown-logout" id="logout-btn" role="menuitem">
            <i class="fa fa-sign-out"></i> Sign Out
          </button>
        </div>
      </div>
    </div>
  </nav>
</header>

<script>
  // Header auth UI — inline so it runs immediately after header loads
  (function initHeaderAuth() {
    function getToken() { return localStorage.getItem("gw_token"); }
    function getUser() { const r = localStorage.getItem("gw_user"); return r ? JSON.parse(r) : null; }
    function isLoggedIn() {
      const t = getToken();
      if (!t) return false;
      try { const p = JSON.parse(atob(t.split(".")[1])); return p.exp * 1000 > Date.now(); }
      catch { return false; }
    }

    const user = getUser();
    const loggedIn = isLoggedIn();
    const loginBtn = document.getElementById("nav-login-btn");
    const userMenu = document.getElementById("user-menu");

    if (loggedIn && user) {
      if (loginBtn) loginBtn.style.display = "none";
      if (userMenu) userMenu.style.display = "flex";

      const initials = ((user.fullName || user.username || "U").split(" ").map(w => w[0]).join("").slice(0,2).toUpperCase());

      const els = {
        "avatar-initials": initials,
        "dropdown-initials": initials,
        "user-display-name": user.fullName ? user.fullName.split(" ")[0] : user.username,
        "dropdown-user-name": user.fullName || user.username,
        "dropdown-user-email": user.email || ""
      };
      Object.entries(els).forEach(([id, val]) => {
        const el = document.getElementById(id);
        if (el) el.textContent = val;
      });
    }

    // Dropdown toggle
    const profileBtn = document.getElementById("profile-link");
    const dropdown = document.getElementById("auth-dropdown");
    const chevron = document.getElementById("chevron-icon");

    if (profileBtn) {
      profileBtn.addEventListener("click", (e) => {
        e.stopPropagation();
        const open = dropdown.classList.toggle("open");
        profileBtn.setAttribute("aria-expanded", open);
        if (chevron) chevron.style.transform = open ? "rotate(180deg)" : "rotate(0)";
      });
    }
    document.addEventListener("click", () => {
      if (dropdown) {
        dropdown.classList.remove("open");
        if (profileBtn) profileBtn.setAttribute("aria-expanded", "false");
        if (chevron) chevron.style.transform = "rotate(0)";
      }
    });

    // Logout
    const logoutBtn = document.getElementById("logout-btn");
    if (logoutBtn) {
      logoutBtn.addEventListener("click", () => {
        localStorage.removeItem("gw_token");
        localStorage.removeItem("gw_user");
        window.location.href = "login.html";
      });
    }
  })();
</script>
